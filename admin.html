<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Central Administrativo - Multiferramentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; width: 100%; max-width: 350px; }
        .toast-item { pointer-events: auto; padding: 12px 24px; border-radius: 9999px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); color: white; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: all 0.4s; opacity: 0; transform: translateY(-20px); }
        .toast-item.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-[#0a0a0a] text-gray-800 dark:text-gray-100 min-h-screen">
    <div id="toast-container"></div>

    <div id="admin-auth" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white dark:bg-zinc-900 p-10 rounded-[40px] shadow-2xl border dark:border-zinc-800 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/20"><i class="fas fa-shield-halved text-4xl text-white"></i></div>
            <h1 class="text-2xl font-bold mb-1">Painel Central</h1>
            <p class="text-xs text-gray-500 uppercase font-bold tracking-[0.2em] mb-8">Administração</p>
            <div class="space-y-4 text-left">
                <div><label class="block text-[10px] font-bold text-gray-400 uppercase ml-1 mb-1">Usuário</label><input type="text" id="adminUser" class="w-full p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border dark:border-zinc-700" placeholder="Ilario"></div>
                <div><label class="block text-[10px] font-bold text-gray-400 uppercase ml-1 mb-1">Senha</label><input type="password" id="adminPass" class="w-full p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border dark:border-zinc-700" placeholder="ilario2025"></div>
                <button onclick="adminLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-white shadow-xl active:scale-95 transition-all mt-4">Acessar Sistema</button>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden flex flex-col h-screen overflow-hidden">
        <header class="h-20 border-b dark:border-zinc-800 flex justify-between items-center px-8 bg-white dark:bg-zinc-900 shrink-0 shadow-sm z-10">
            <div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-shield-halved text-lg"></i></div><div><h1 class="font-black text-lg leading-none">Multiferramentas</h1><p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mt-1">Central de Controle</p></div></div>
            <button onclick="adminLogout()" class="text-red-500 font-bold flex items-center gap-2"><i class="fas fa-power-off"></i> Sair</button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-80 border-r dark:border-zinc-800 bg-white dark:bg-zinc-900 flex flex-col shrink-0">
                <div class="p-6 border-b dark:border-zinc-800 bg-gray-50 dark:bg-zinc-800/20">
                    <h2 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Entregadores</h2>
                    <div class="relative"><input type="text" oninput="window.filterAdminUsers(this.value)" placeholder="Pesquisar..." class="w-full p-3 pl-10 text-xs bg-white dark:bg-zinc-900 border dark:border-zinc-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"><i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i></div>
                </div>
                <div id="adminUserList" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-2"></div>
            </aside>

            <main class="flex-1 flex flex-col p-6 bg-gray-50 dark:bg-[#080808] overflow-hidden">
                <div id="admin-user-detail" class="hidden flex flex-col h-full gap-6">
                    <div class="flex flex-col lg:flex-row gap-6 shrink-0">
                        <div class="flex-1 bg-white dark:bg-zinc-900 p-6 rounded-[32px] border dark:border-zinc-800 shadow-xl flex justify-between items-center">
                            <div><h2 id="admin-selected-name" class="text-2xl font-black mb-1 text-gray-800 dark:text-white">...</h2><p id="admin-selected-email" class="text-xs text-gray-500 font-bold uppercase tracking-wider">...</p></div>
                            <button id="admin-block-btn" class="px-6 py-3 rounded-2xl text-[10px] font-black shadow-lg uppercase transition-all"></button>
                        </div>
                        <div class="grid grid-cols-4 gap-3 lg:w-[450px]">
                            <div class="bg-blue-600/10 p-4 rounded-3xl text-center"><span class="text-[9px] font-black text-blue-600 uppercase leading-none">Rota</span><p id="adm-det-pending" class="text-xl font-black text-blue-600 leading-none mt-1">0</p></div>
                            <div class="bg-green-600/10 p-4 rounded-3xl text-center"><span class="text-[9px] font-black text-green-600 uppercase leading-none">OK</span><p id="adm-det-ok" class="text-xl font-black text-green-600 leading-none mt-1">0</p></div>
                            <div class="bg-red-600/10 p-4 rounded-3xl text-center"><span class="text-[9px] font-black text-red-600 uppercase leading-none">Falta</span><p id="adm-det-missing" class="text-xl font-black text-red-600 leading-none mt-1">0</p></div>
                            <div class="bg-zinc-600/10 p-4 rounded-3xl text-center"><span class="text-[9px] font-black text-gray-500 uppercase leading-none">Perdido</span><p id="adm-det-lost" class="text-xl font-black text-gray-500 leading-none mt-1">0</p></div>
                        </div>
                    </div>

                    <div class="flex-1 bg-white dark:bg-zinc-900 rounded-[40px] border dark:border-zinc-800 shadow-xl overflow-hidden flex flex-col">
                        <div class="p-6 border-b dark:border-zinc-800 flex gap-4 bg-gray-50 dark:bg-zinc-800/30">
                            <div class="relative flex-1"><input type="text" id="adminPkgSearch" oninput="window.renderAdminPackages()" placeholder="Localizar código..." class="w-full p-3.5 pl-11 text-xs bg-white dark:bg-zinc-900 border dark:border-zinc-700 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"><i class="fas fa-barcode absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i></div>
                            <select id="adminStatusFilter" onchange="window.renderAdminPackages()" class="p-3.5 text-xs bg-white dark:bg-zinc-900 border dark:border-zinc-700 rounded-2xl font-bold outline-none cursor-pointer"><option value="all">Ver Tudo</option><option value="bipados">Em Rota</option><option value="devolvidos">Devolvido (OK)</option><option value="faltas">Faltante</option><option value="perdidos">Perdido</option></select>
                        </div>
                        <div id="adminPackageTable" class="flex-1 overflow-y-auto custom-scrollbar divide-y dark:divide-zinc-800/50"></div>
                    </div>
                </div>

                <div id="admin-empty-state" class="flex-1 flex flex-col items-center justify-center opacity-30 text-center"><div class="w-32 h-32 rounded-[40px] bg-blue-600/5 flex items-center justify-center mb-8 border border-blue-600/10 shadow-2xl"><i class="fas fa-users-gear text-6xl text-blue-600/40"></i></div><h2 class="text-3xl font-black mb-3">Painel de Monitoramento</h2><p class="text-sm font-medium max-w-sm">Selecione um entregador na lista lateral para monitorar pacotes e status em tempo real.</p></div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, orderBy, updateDoc, doc, getDocs, where, deleteDoc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC05tYoKOHOBf6pNhhmMqgSap1g3iB4Im4",
            authDomain: "logistica-pacotes.firebaseapp.com",
            projectId: "logistica-pacotes",
            storageBucket: "logistica-pacotes.firebasestorage.app",
            messagingSenderId: "1075697583297",
            appId: "1:1075697583297:web:e5449efc5e8e5cf08d4040"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "logistica-pacotes";

        let allUsers = [], selectedUserId = null, adminPackageData = [], currentPackageListeners = [];

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'admin@gmail.com') { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-dashboard').classList.remove('hidden'); loadUsers(); }
            else { document.getElementById('admin-auth').classList.remove('hidden'); document.getElementById('admin-dashboard').classList.add('hidden'); if(user) signOut(auth); }
        });

        window.adminLogin = async () => {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;
            let email = user.toLowerCase() === "ilario" ? "admin@gmail.com" : user;
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch (err) { showToast("Dados incorretos", "bg-red-600", "fa-times"); }
        };

        window.adminLogout = () => signOut(auth).then(() => window.location.reload());

        function loadUsers() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'userRegistry'), (snap) => {
                allUsers = []; snap.forEach(doc => allUsers.push(doc.data())); renderUserList();
            });
        }

        function renderUserList(filter = '') {
            const list = document.getElementById('adminUserList');
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(filter.toLowerCase()));
            if (filtered.length === 0) { list.innerHTML = `<p class="p-8 text-center text-gray-500 text-xs">Vazio.</p>`; return; }
            list.innerHTML = filtered.map(u => `
                <div onclick="selectAdminUser('${u.uid}')" class="p-4 bg-white dark:bg-zinc-800 border dark:border-zinc-700/50 rounded-2xl cursor-pointer hover:border-blue-500 transition-all ${selectedUserId === u.uid ? 'ring-2 ring-blue-500 bg-blue-500/5' : ''}">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-zinc-900 flex items-center justify-center text-gray-800 dark:text-white font-black text-xs shrink-0 shadow-inner">${u.name.charAt(0).toUpperCase()}</div>
                        <div class="flex-1 truncate"><h3 class="font-bold text-xs truncate">${u.name}</h3><p class="text-[9px] text-gray-500 font-medium">${u.email}</p></div>
                        <div class="w-2 h-2 rounded-full ${u.status === 'bloqueado' ? 'bg-red-500' : 'bg-green-500'}"></div>
                    </div>
                </div>`).join('');
        }

        window.selectAdminUser = (uid) => {
            selectedUserId = uid; const user = allUsers.find(u => u.uid === uid);
            document.getElementById('admin-user-detail').classList.remove('hidden');
            document.getElementById('admin-empty-state').classList.add('hidden');
            document.getElementById('admin-selected-name').innerText = user.name;
            document.getElementById('admin-selected-email').innerText = user.email;
            const b = document.getElementById('admin-block-btn');
            b.className = user.status === 'bloqueado' ? "px-6 py-3 bg-green-600 text-white rounded-2xl text-[10px] font-black shadow-lg uppercase" : "px-6 py-3 bg-red-600 text-white rounded-2xl text-[10px] font-black shadow-lg uppercase";
            b.innerText = user.status === 'bloqueado' ? 'Desbloquear' : 'Bloquear Acesso';
            b.onclick = () => toggleUserLock(uid, user.status);
            renderUserList(); initAdminUserPackagesListener(uid);
        };

        async function toggleUserLock(uid, current) {
            const next = current === 'bloqueado' ? 'ativo' : 'bloqueado';
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userRegistry', uid), { status: next });
            showToast(`Usuário ${next}`, "bg-blue-600", "fa-user-lock");
        }

        function initAdminUserPackagesListener(userId) {
            currentPackageListeners.forEach(u => u()); currentPackageListeners = [];
            const cols = ['bipados', 'devolvidos', 'faltas', 'perdidos'];
            let temp = { bipados: [], devolvidos: [], faltas: [], perdidos: [] };
            cols.forEach(col => {
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'users', userId, col), (snap) => {
                    temp[col] = []; snap.forEach(d => temp[col].push({ ...d.data(), fid: d.id, colName: col }));
                    adminPackageData = [...temp.bipados, ...temp.devolvidos, ...temp.faltas, ...temp.perdidos];
                    adminPackageData.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderAdminPackages();
                });
                currentPackageListeners.push(unsub);
            });
        }

        window.renderAdminPackages = () => {
            const search = document.getElementById('adminPkgSearch').value.toLowerCase();
            const filter = document.getElementById('adminStatusFilter').value;
            const list = document.getElementById('adminPackageTable');
            const filtered = adminPackageData.filter(p => {
                const ms = p.id.toLowerCase().includes(search);
                const mf = filter === 'all' || p.colName === filter;
                return ms && mf;
            });
            document.getElementById('adm-det-pending').innerText = adminPackageData.filter(p => p.colName === 'bipados').length;
            document.getElementById('adm-det-ok').innerText = adminPackageData.filter(p => p.colName === 'devolvidos').length;
            document.getElementById('adm-det-missing').innerText = adminPackageData.filter(p => p.colName === 'faltas').length;
            document.getElementById('adm-det-lost').innerText = adminPackageData.filter(p => p.colName === 'perdidos').length;
            if (filtered.length === 0) { list.innerHTML = `<p class="p-20 text-center text-gray-500 text-xs italic">Nenhum registro.</p>`; return; }
            list.innerHTML = filtered.map(p => {
                const time = p.timestamp ? p.timestamp.toDate().toLocaleString('pt-BR') : '...';
                let sCol = "text-blue-500 bg-blue-500/10";
                if(p.colName === 'devolvidos') sCol = "text-green-500 bg-green-500/10";
                if(p.colName === 'faltas') sCol = "text-red-500 bg-red-500/10";
                if(p.colName === 'perdidos') sCol = "text-gray-500 bg-gray-500/20";
                return `<div class="p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-white/5 transition-all"><div><div class="flex items-center gap-2"><span class="font-mono font-bold text-sm">${p.id}</span><span class="px-2 py-0.5 rounded-lg text-[8px] font-black uppercase ${sCol}">${p.status}</span></div><p class="text-[10px] text-gray-400 mt-1 uppercase tracking-tighter">${time}</p></div><div class="flex gap-2"><select onchange="window.changeStatusRemote('${selectedUserId}', '${p.colName}', '${p.fid}', this.value)" class="bg-gray-100 dark:bg-zinc-800 text-[9px] p-2 rounded-xl outline-none font-black cursor-pointer border dark:border-zinc-700"><option value="" disabled selected>ALTERAR</option><option value="Em rota">PARA ROTA</option><option value="Devolvido">MARCAR OK</option><option value="Falta">MARCAR FALTA</option><option value="Perdido">PERDIDO</option></select><button onclick="window.delPkgRemote('${selectedUserId}', '${p.colName}', '${p.fid}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded-xl"><i class="fas fa-trash-can"></i></button></div></div>`;
            }).join('');
        };

        window.changeStatusRemote = async (uid, oldCol, fid, next) => {
            const map = { 'Em rota': 'bipados', 'Devolvido': 'devolvidos', 'Falta': 'faltas', 'Perdido': 'perdidos' };
            const nextCol = map[next]; if (oldCol === nextCol) return;
            try {
                const ref = doc(db, 'artifacts', appId, 'users', uid, oldCol, fid);
                const snap = await getDoc(ref);
                await setDoc(doc(db, 'artifacts', appId, 'users', uid, nextCol, fid), { ...snap.data(), status: next, timestamp: serverTimestamp() });
                await deleteDoc(ref);
                showToast("Status Atualizado", "bg-blue-600", "fa-check");
            } catch (e) { showToast("Erro", "bg-red-600", "fa-times"); }
        };

        window.delPkgRemote = async (uid, col, fid) => { if(confirm("Excluir item permanentemente?")) { await deleteDoc(doc(db, 'artifacts', appId, 'users', uid, col, fid)); showToast("Excluído", "bg-red-600", "fa-trash"); } };
        function showToast(m, c, i) { const container = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = `toast-item ${c}`; t.innerHTML = `<i class="fas ${i}"></i> <span>${m}</span>`; container.appendChild(t); setTimeout(() => t.classList.add('show'), 10); setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 4000); }
        window.filterAdminUsers = (v) => renderUserList(v);
    </script>
</body>
</html>
