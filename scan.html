<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Direto + Relatório</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- jsPDF para gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-pulse:active { transform: scale(0.95); }
        
        /* Ajuste do autofill para a nova cor de fundo dos inputs (Zinc-800 / #27272a) */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            transition: background-color 5000s ease-in-out 0s;
        }
        
        .dark input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #27272a inset !important;
            -webkit-text-fill-color: white !important;
        }
        
        html:not(.dark) input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #f3f4f6 inset !important;
            -webkit-text-fill-color: #1f2937 !important;
        }

        /* Remove setinhas do input number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate {
            animation: modalIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-100 min-h-screen flex flex-col items-center justify-center font-sans selection:bg-green-500 selection:text-white transition-colors duration-300 overflow-hidden">

    <!-- Botão de Tema -->
    <div class="absolute top-4 right-4 z-40">
        <button 
            onclick="toggleTheme()" 
            class="w-10 h-10 rounded-full bg-white dark:bg-zinc-800 shadow-lg flex items-center justify-center text-gray-600 dark:text-gray-200 hover:scale-110 transition-transform duration-200 focus:outline-none ring-1 ring-gray-200 dark:ring-gray-600"
            title="Alternar Tema"
        >
            <i id="themeIcon" class="fas fa-sun"></i>
        </button>
    </div>

    <!-- Container Principal -->
    <main class="w-full max-w-md p-6 animate-fade-in relative z-10">
        
        <!-- Cabeçalho -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 mb-4 ring-1 ring-green-500/30 shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                <i class="fab fa-whatsapp text-5xl text-green-600 dark:text-green-400"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white tracking-tight">Zap Entregas</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Contato rápido por Parada</p>
        </div>

        <!-- Formulário -->
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl border border-gray-200 dark:border-zinc-700 shadow-xl transition-colors duration-300">
            
            <div class="flex justify-between ml-1 mb-2">
                <label class="text-xs font-bold text-gray-500 dark:text-gray-300 uppercase tracking-wider">Parada</label>
                <label class="text-xs font-bold text-gray-500 dark:text-gray-300 uppercase tracking-wider mr-4">Telefone</label>
            </div>
            
            <!-- Grupo de Inputs -->
            <div class="flex gap-3 mb-2">
                <!-- Input PARADA -->
                <div class="w-24">
                    <input 
                        type="number" 
                        id="stopInput" 
                        class="w-full bg-gray-100 dark:bg-zinc-800 text-center text-gray-900 dark:text-white py-4 rounded-xl border border-transparent dark:border-zinc-700 focus:bg-white dark:focus:bg-zinc-700 focus:border-green-500 dark:focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all placeholder-gray-400 dark:placeholder-gray-400 font-bold text-lg"
                        placeholder="00"
                        min="0"
                        max="999"
                        oninput="if(this.value.length > 3) this.value = this.value.slice(0,3);"
                    >
                </div>
                <!-- Input TELEFONE -->
                <div class="flex-1 relative">
                    <input 
                        type="tel" 
                        id="phoneInput" 
                        class="w-full bg-gray-100 dark:bg-zinc-800 text-gray-900 dark:text-white px-4 py-4 rounded-xl border border-transparent dark:border-zinc-700 focus:bg-white dark:focus:bg-zinc-700 focus:border-green-500 dark:focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all placeholder-gray-400 dark:placeholder-gray-400 text-lg tracking-wide font-mono text-center"
                        placeholder="(11) 99999-9999"
                        maxlength="15"
                        autocomplete="off"
                    >
                </div>
            </div>

            <!-- Botões de Ação Rápida -->
            <div class="flex justify-between items-center px-1 mb-6">
                <button 
                    onclick="pasteFromClipboard()"
                    class="text-xs text-gray-500 dark:text-gray-400 hover:text-green-600 dark:hover:text-green-400 transition-colors flex items-center gap-2 py-1 px-2 rounded hover:bg-gray-100 dark:hover:bg-zinc-800 font-medium"
                >
                    <i class="far fa-clipboard"></i> Colar
                </button>

                <button 
                    onclick="clearInputs()"
                    class="text-xs text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-colors flex items-center gap-2 py-1 px-2 rounded hover:bg-gray-100 dark:hover:bg-zinc-800 font-medium"
                >
                    <i class="fas fa-trash-alt"></i> Apagar Tudo
                </button>
            </div>

            <!-- Input de Mensagem -->
            <label class="block text-xs font-bold text-gray-500 dark:text-gray-300 uppercase tracking-wider mb-2 ml-1">Mensagem (Opcional)</label>
            <div class="relative mb-6">
                <textarea 
                    id="messageInput" 
                    class="w-full bg-gray-100 dark:bg-zinc-800 text-gray-900 dark:text-white p-4 rounded-xl border border-transparent dark:border-zinc-700 focus:bg-white dark:focus:bg-zinc-700 focus:border-green-500 dark:focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all placeholder-gray-400 dark:placeholder-gray-400 resize-none h-24 text-sm"
                    placeholder="Sua mensagem aqui..."
                >Olá. Entrega do Mercado Livre.</textarea>
                <div class="absolute bottom-3 right-3 text-gray-400 dark:text-gray-400 text-xs pointer-events-none">
                    <i class="far fa-comment-dots"></i>
                </div>
            </div>

            <!-- Botão de Ação -->
            <button 
                onclick="openWhatsapp()" 
                class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-900/20 transition-all duration-300 flex items-center justify-center gap-2 btn-pulse group mb-4 text-base"
            >
                <span>Iniciar Conversa</span>
                <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
            </button>

            <!-- Botão Histórico do Dia -->
            <button 
                onclick="openHistoryModal()"
                class="w-full bg-gray-200 dark:bg-zinc-800 hover:bg-gray-300 dark:hover:bg-zinc-700 text-gray-600 dark:text-gray-200 font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider border border-transparent dark:border-zinc-700"
            >
                <i class="fas fa-history"></i> Histórico do dia
            </button>
        </div>

        <!-- Footer -->
        <footer class="mt-10 text-center text-gray-400 dark:text-gray-500 text-xs">
            <p>&copy; Feito por entregador, para entregador. @guiilario.</p>
        </footer>
    </main>

    <!-- Modal de Histórico -->
    <div id="historyModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4">
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeHistoryModal()"></div>
        
        <!-- Conteúdo do Modal -->
        <div class="relative w-full max-w-sm bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl p-6 modal-animate flex flex-col max-h-[80vh] border border-transparent dark:border-zinc-700">
            
            <div class="flex justify-between items-center mb-4 border-b border-gray-200 dark:border-zinc-700 pb-4">
                <h3 class="text-lg font-bold text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="fas fa-calendar-day text-green-500"></i> Histórico de Hoje
                </h3>
                <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-red-500 dark:hover:text-red-400 transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <!-- Lista com Scroll -->
            <div id="modalHistoryList" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar min-h-[100px]">
                <!-- Itens injetados via JS -->
            </div>

            <!-- Rodapé do Modal com Ações -->
            <div class="mt-4 pt-3 border-t border-gray-200 dark:border-zinc-700 flex justify-between items-center px-1">
                 
                 <!-- Botão Excluir -->
                 <button onclick="clearDailyHistory()" class="flex items-center gap-2 text-xs text-red-500 hover:text-red-600 dark:text-red-400 dark:hover:text-red-300 font-bold tracking-wide uppercase transition-colors px-2 py-2 rounded hover:bg-red-50 dark:hover:bg-red-900/20">
                    <i class="fas fa-trash-alt"></i> Limpar Tudo
                </button>

                <!-- Botão Salvar PDF -->
                <button onclick="saveHistoryPDF()" class="flex items-center gap-2 text-xs text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-bold tracking-wide uppercase transition-colors px-3 py-2 rounded bg-blue-50 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/40">
                    <i class="fas fa-file-pdf"></i> Salvar PDF
                </button>
            </div>
        </div>
    </div>

    <!-- Notificação Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-500/90 text-white px-6 py-3 rounded-full shadow-2xl backdrop-blur-md opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2 text-sm font-medium">
        <i class="fas fa-exclamation-circle"></i>
        <span id="toastMsg">Erro</span>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        const stopInput = document.getElementById('stopInput');
        const messageInput = document.getElementById('messageInput');
        const themeIcon = document.getElementById('themeIcon');
        const historyModal = document.getElementById('historyModal');
        const modalHistoryList = document.getElementById('modalHistoryList');

        // --- Lógica de Tema ---
        function initTheme() {
            if (localStorage.theme === 'light') {
                document.documentElement.classList.remove('dark');
                updateThemeIcon(false);
            } else {
                document.documentElement.classList.add('dark');
                updateThemeIcon(true);
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            updateThemeIcon(isDark);
        }

        function updateThemeIcon(isDark) {
            if (isDark) {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        initTheme();

        // --- Lógica do App ---

        phoneInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, ''); 
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length > 10) {
                value = value.replace(/^(\d\d)(\d{5})(\d{4}).*/, "($1) $2-$3");
            } else if (value.length > 5) {
                value = value.replace(/^(\d\d)(\d{4})(\d{0,4}).*/, "($1) $2-$3");
            } else if (value.length > 2) {
                value = value.replace(/^(\d\d)(\d{0,5}).*/, "($1) $2");
            } else if (value.length > 0) {
                value = value.replace(/^(\d*)/, "($1");
            }
            e.target.value = value;
        });

        function clearInputs() {
            phoneInput.value = "";
            stopInput.value = "";
            stopInput.focus();
        }

        function openWhatsapp(phoneOverride = null, stopOverride = null) {
            let rawNumber = phoneOverride || phoneInput.value.replace(/\D/g, '');
            let stopNumber = stopOverride || stopInput.value;
            let message = messageInput.value;

            if (rawNumber.length < 10) {
                showToast("Digite o telefone com DDD.");
                return;
            }

            const fullNumber = `55${rawNumber}`;
            const encodedMessage = encodeURIComponent(message);
            const url = `https://api.whatsapp.com/send?phone=${fullNumber}&text=${encodedMessage}`;

            if (!phoneOverride) {
                saveToHistory(rawNumber, stopNumber);
            }

            window.open(url, '_blank');
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                const cleanText = text.replace(/\D/g, '');
                if (cleanText.length >= 10) {
                    let numberToInput = cleanText;
                    if (cleanText.length >= 12 && cleanText.startsWith('55')) {
                        numberToInput = cleanText.substring(2);
                    }
                    const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                    nativeInputValueSetter.call(phoneInput, numberToInput);
                    const inputEvent = new Event('input', { bubbles: true});
                    phoneInput.dispatchEvent(inputEvent);
                } else {
                    showToast("Área de transferência inválida.");
                }
            } catch (err) {
                showToast("Permissão negada.");
            }
        }

        // --- Histórico ---

        function saveToHistory(number, stop) {
            let history = JSON.parse(localStorage.getItem('wa_full_history_v2') || '[]');
            const today = new Date().toLocaleDateString('pt-BR');
            history = history.filter(item => !(item.phone === number && item.date === today));
            history.unshift({
                phone: number,
                stop: stop,
                date: today,
                timestamp: Date.now()
            });
            localStorage.setItem('wa_full_history_v2', JSON.stringify(history));
        }

        // --- Modal & PDF ---

        function openHistoryModal() {
            historyModal.classList.remove('hidden');
            renderHistoryList();
        }

        function closeHistoryModal() {
            historyModal.classList.add('hidden');
        }

        function renderHistoryList() {
            const history = JSON.parse(localStorage.getItem('wa_full_history_v2') || '[]');
            const today = new Date().toLocaleDateString('pt-BR');
            const todaysCalls = history.filter(item => item.date === today);

            if (todaysCalls.length === 0) {
                modalHistoryList.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-8 opacity-50 dark:opacity-40 text-gray-500 dark:text-gray-400">
                        <i class="far fa-calendar-times text-3xl mb-2"></i>
                        <p class="text-sm">Nenhum histórico hoje.</p>
                    </div>`;
                return;
            }

            modalHistoryList.innerHTML = '';

            todaysCalls.forEach(item => {
                const formattedPhone = item.phone.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
                const stopLabel = item.stop ? `P: ${item.stop}` : 'P';
                
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-gray-50 dark:bg-zinc-800 p-3 rounded-xl border border-gray-100 dark:border-zinc-700 hover:border-green-500 dark:hover:border-green-500 transition-colors group";
                
                div.innerHTML = `
                    <div class="flex items-center">
                        <span class="bg-gray-200 dark:bg-zinc-700 text-gray-700 dark:text-gray-300 px-1.5 py-0.5 rounded text-[10px] font-bold mr-2 w-auto min-w-[20px] text-center inline-block shadow-sm">${stopLabel}</span>
                        <span class="text-gray-700 dark:text-gray-200 font-mono text-base font-medium">${formattedPhone}</span>
                    </div>
                    
                    <button 
                        onclick="openWhatsapp('${item.phone}', '${item.stop || ''}')"
                        class="bg-green-500 hover:bg-green-600 text-white px-3 py-2 rounded-lg text-xs shadow-lg shadow-green-500/20 active:scale-90 transition-all flex items-center gap-2 font-bold uppercase tracking-wide"
                        title="Chamar novamente"
                    >
                        <span>Chamar</span>
                        <i class="fab fa-whatsapp"></i>
                    </button>
                `;
                modalHistoryList.appendChild(div);
            });
        }

        function clearDailyHistory() {
            if(confirm("Deseja apagar todo o histórico de HOJE?")) {
                const today = new Date().toLocaleDateString('pt-BR');
                let history = JSON.parse(localStorage.getItem('wa_full_history_v2') || '[]');
                history = history.filter(item => item.date !== today);
                localStorage.setItem('wa_full_history_v2', JSON.stringify(history));
                renderHistoryList();
            }
        }

        // Função para Gerar PDF
        function saveHistoryPDF() {
            const history = JSON.parse(localStorage.getItem('wa_full_history_v2') || '[]');
            const today = new Date().toLocaleDateString('pt-BR');
            const todaysCalls = history.filter(item => item.date === today);

            if (todaysCalls.length === 0) {
                showToast("Nada para salvar hoje.");
                return;
            }

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                doc.setFontSize(18);
                doc.text(`Relatório de Contatos - Whatsapp - ${today}`, 14, 20);
                
                doc.setFontSize(10);
                doc.text(`Total de chamadas: ${todaysCalls.length}`, 14, 28);

                const chronologicalData = [...todaysCalls].reverse();

                const tableData = chronologicalData.map(item => {
                    const time = new Date(item.timestamp).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    return [
                        item.stop || '-', 
                        item.phone.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3"),
                        time
                    ];
                });

                doc.autoTable({
                    head: [['Parada', 'Telefone', 'Horário']],
                    body: tableData,
                    startY: 35,
                    theme: 'grid',
                    styles: { fontSize: 10, cellPadding: 3 },
                    headStyles: { fillColor: [22, 163, 74] } 
                });

                const safeDate = today.replace(/\//g, '-');
                doc.save(`Relatorio_Contatos_Whatsapp_${safeDate}.pdf`);

            } catch (err) {
                console.error(err);
                showToast("Erro ao gerar PDF.");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.innerText = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }
    </script>
</body>
</html>
