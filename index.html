<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiferramentas Entregas - Cloud Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bibliotecas de PDF e ZXing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

    <!-- FIREBASE INTEGRATION (MODULAR SDK) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot, orderBy, updateDoc, doc, getDocs, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC05tYoKOHOBf6pNhhmMqgSap1g3iB4Im4",
            authDomain: "logistica-pacotes.firebaseapp.com",
            projectId: "logistica-pacotes",
            storageBucket: "logistica-pacotes.firebasestorage.app",
            messagingSenderId: "1075697583297",
            appId: "1:1075697583297:web:e5449efc5e8e5cf08d4040"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Salvar novo pacote (Em rota)
        window.saveToFirebase = async (code, user, status) => {
            try {
                await addDoc(collection(db, "bipados"), {
                    id: code,
                    user: user,
                    status: status,
                    timestamp: serverTimestamp()
                });
            } catch (e) {
                console.error("Erro Firebase:", e);
                showToast("Erro de conexão", "bg-red-500", "fa-cloud-slash");
            }
        };

        // Atualizar Status Unitário
        window.updateStatusFirebase = async (code, newStatus) => {
            try {
                const q = query(collection(db, "bipados"), where("id", "==", code));
                const querySnapshot = await getDocs(q);
                querySnapshot.forEach(async (document) => {
                    const docRef = doc(db, "bipados", document.id);
                    await updateDoc(docRef, { 
                        status: newStatus,
                        lastUpdate: serverTimestamp()
                    });
                });
            } catch (e) {
                console.error("Erro ao atualizar:", e);
            }
        };

        // Finalizar: Transformar 'Em rota' em 'Falta'
        window.finalizeInFirebase = async (user) => {
            try {
                const q = query(collection(db, "bipados"), where("status", "==", "Em rota"));
                const querySnapshot = await getDocs(q);
                const batch = writeBatch(db);
                
                querySnapshot.forEach((document) => {
                    const docRef = doc(db, "bipados", document.id);
                    batch.update(docRef, { status: "Falta" });
                });

                await batch.commit();
                return true;
            } catch (e) {
                console.error("Erro ao finalizar:", e);
                return false;
            }
        };

        // Listener Real-time
        const q = query(collection(db, "bipados"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allPackages = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString('pt-BR') : "...";
                allPackages.push({ ...data, time: time });
            });
            updateScanUI();
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-pulse:active { transform: scale(0.95); }
        .row-done { background-color: rgba(34, 197, 94, 0.1) !important; border-left: 4px solid #22c55e !important; }
        .row-missing { background-color: rgba(239, 68, 68, 0.1) !important; border-left: 4px solid #ef4444 !important; }
        .row-route { background-color: rgba(59, 130, 246, 0.05) !important; border-left: 4px solid #3b82f6 !important; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Navbar -->
    <div class="fixed top-0 left-0 right-0 h-16 z-40 pointer-events-none">
        <button onclick="toggleMenu()" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-white dark:bg-zinc-800 shadow-lg flex items-center justify-center text-gray-600 dark:text-gray-200 pointer-events-auto ring-1 ring-gray-200 dark:ring-gray-600"><i class="fas fa-bars"></i></button>
        <button onclick="toggleTheme()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white dark:bg-zinc-800 shadow-lg flex items-center justify-center text-gray-600 dark:text-gray-200 pointer-events-auto ring-1 ring-gray-200 dark:ring-gray-600"><i id="themeIcon" class="fas fa-sun"></i></button>
    </div>

    <!-- Sidebar -->
    <div id="menuOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="fixed inset-y-0 left-0 w-64 bg-white dark:bg-zinc-900 shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out z-50 flex flex-col border-r border-gray-200 dark:border-zinc-700">
        <div class="p-5 border-b border-gray-200 dark:border-zinc-700 flex justify-between items-center">
            <h2 class="font-bold flex items-center gap-2">Menu Logística</h2>
            <button onclick="toggleMenu()"><i class="fas fa-times text-xl text-gray-400"></i></button>
        </div>
        <nav class="p-4 flex flex-col gap-2">
            <a href="#" onclick="switchView('zap'); toggleMenu();" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors">
                <i class="fab fa-whatsapp text-green-500"></i> Zap Entregas
            </a>
            <a href="#" onclick="switchView('scan'); toggleMenu();" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors">
                <i class="fas fa-barcode text-blue-500"></i> Gestão de Lotes
            </a>
        </nav>
    </div>

    <!-- VIEW: ZAP SEM ADD (Simplificada) -->
    <main id="view-zap" class="w-full max-w-md mx-auto p-6 pt-20 flex flex-col justify-center min-h-screen">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center mx-auto mb-4">
                <i class="fab fa-whatsapp text-5xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold">Zap Rápido</h1>
        </div>
        <div class="bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-xl border border-gray-200 dark:border-zinc-700">
            <div class="flex gap-2 mb-4">
                <input type="number" id="stopInput" class="w-20 bg-gray-100 dark:bg-zinc-800 p-4 rounded-xl text-center font-bold" placeholder="P">
                <input type="tel" id="phoneInput" class="flex-1 bg-gray-100 dark:bg-zinc-800 p-4 rounded-xl text-center font-mono" placeholder="Celular">
            </div>
            <button onclick="openWhatsapp()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold btn-pulse">Enviar Mensagem</button>
        </div>
    </main>

    <!-- VIEW: SCAN PCT -->
    <main id="view-scan" class="w-full max-w-2xl mx-auto p-4 pt-24 hidden pb-20">
        <header class="flex justify-between items-center mb-6 bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-zinc-700">
            <div>
                <h1 class="text-2xl font-bold">Gestão <span class="text-blue-600">Cloud</span></h1>
                <p id="modeIndicator" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mt-1">Status: Aguardando</p>
            </div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-blue-500"><i class="fas fa-sync-alt text-xl"></i></button>
        </header>

        <!-- Sessão Ativa -->
        <div id="userSection" class="bg-blue-600 rounded-2xl p-6 shadow-lg text-white mb-6 hidden">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <span class="text-blue-100 text-[10px] font-bold">USUÁRIO ATIVO:</span>
                    <h2 id="currentUserName" class="text-2xl font-bold italic">Nenhum</h2>
                </div>
                <button onclick="finalizeOperation()" class="bg-white/20 hover:bg-white/40 px-4 py-2 rounded-xl font-bold text-sm border border-white/30">Finalizar</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="barcodeInput" placeholder="Bipar código..." class="flex-1 p-4 bg-black/20 rounded-xl text-white outline-none placeholder-blue-100 font-mono">
                <button onclick="handleManualInput()" class="bg-white text-blue-600 w-14 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-plus"></i></button>
            </div>
            <button onclick="toggleCamera()" id="camBtn" class="mt-4 w-full py-4 bg-black/20 rounded-xl font-bold flex items-center justify-center gap-3 border border-white/10 hover:bg-black/30 transition-all">
                <i class="fas fa-camera"></i> <span id="camBtnText">Scanner Câmera</span>
            </button>
        </div>

        <!-- Iniciar Lote -->
        <div id="startSection" class="bg-white dark:bg-zinc-900 rounded-2xl p-8 shadow-sm border border-gray-200 dark:border-zinc-700 text-center">
            <input type="text" id="newUserName" placeholder="Seu Nome" class="w-full p-4 mb-4 bg-gray-50 dark:bg-zinc-800 border dark:border-zinc-700 rounded-2xl text-center text-lg outline-none">
            <div class="flex gap-3">
                <button onclick="startNewBatch('out')" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg">Adicionar</button>
                <button onclick="startNewBatch('return')" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg">Devolver</button>
            </div>
        </div>

        <!-- Câmera Container -->
        <div id="cameraContainer" class="hidden mb-6 mx-auto w-full max-w-[300px] aspect-square bg-black rounded-2xl overflow-hidden relative border-4 border-blue-500/20">
            <video id="readerVideo" class="w-full h-full object-cover" autoplay muted playsinline></video>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-4/5 h-0.5 bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
            </div>
            <button onclick="stopCamera()" class="absolute top-3 right-3 bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-times"></i></button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 my-6">
            <div class="bg-white dark:bg-zinc-900 p-4 rounded-2xl border dark:border-zinc-700 text-center">
                <span class="text-[9px] font-bold text-blue-500 uppercase">Em Rota</span>
                <p id="statPending" class="text-xl font-bold">0</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 p-4 rounded-2xl border dark:border-zinc-700 text-center">
                <span class="text-[9px] font-bold text-green-500 uppercase tracking-tighter">Devolvido</span>
                <p id="statOk" class="text-xl font-bold">0</p>
            </div>
            <div class="bg-white dark:bg-zinc-900 p-4 rounded-2xl border dark:border-zinc-700 text-center">
                <span class="text-[9px] font-bold text-red-500 uppercase">Falta</span>
                <p id="statMissing" class="text-xl font-bold">0</p>
            </div>
        </div>

        <!-- Lista -->
        <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-sm border dark:border-zinc-700 overflow-hidden">
            <div class="p-4 bg-slate-50 dark:bg-zinc-800 border-b dark:border-zinc-700 flex justify-between items-center text-[10px] font-bold">
                <span class="text-slate-500 uppercase tracking-widest">Registros em Tempo Real</span>
                <span id="listCount" class="text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded">0 total</span>
            </div>
            <div id="packageList" class="divide-y dark:divide-zinc-800 max-h-[500px] overflow-y-auto">
                <div class="p-12 text-center text-slate-400 italic">Conectando ao banco...</div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 z-[100] flex items-center gap-2 text-sm font-bold text-white pointer-events-none">
        <i id="toastIcon"></i> <span id="toastMsg"></span>
    </div>

    <script>
        let allPackages = [];
        let currentBatchUser = null;
        let isConferenceMode = false;
        let codeReader = null;
        let isCameraActive = false;
        let audioCtx = null;

        // UI Controls
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        function toggleMenu() {
            const side = document.getElementById('sideMenu');
            const over = document.getElementById('menuOverlay');
            const isOpen = !side.classList.contains('-translate-x-full');
            if(!isOpen) {
                over.classList.remove('hidden');
                setTimeout(() => { over.classList.remove('opacity-0'); side.classList.remove('-translate-x-full'); }, 10);
            } else {
                over.classList.add('opacity-0');
                side.classList.add('-translate-x-full');
                setTimeout(() => over.classList.add('hidden'), 300);
            }
        }
        function switchView(v) {
            document.getElementById('view-zap').classList.add('hidden');
            document.getElementById('view-scan').classList.add('hidden');
            document.getElementById('view-' + v).classList.remove('hidden');
            stopCamera();
        }

        // Logic
        function startNewBatch(mode) {
            const name = document.getElementById('newUserName').value.trim();
            if(!name) return showToast("Digite seu nome", "bg-red-500", "fa-user");
            
            initAudio();
            currentBatchUser = name;
            isConferenceMode = (mode === 'return');
            
            document.getElementById('currentUserName').innerText = name;
            document.getElementById('modeIndicator').innerText = isConferenceMode ? "MODO: DEVOLVER" : "MODO: ADICIONAR";
            
            const userSection = document.getElementById('userSection');
            userSection.className = isConferenceMode ? "bg-green-600 rounded-2xl p-6 shadow-lg text-white mb-6" : "bg-blue-600 rounded-2xl p-6 shadow-lg text-white mb-6";
            
            document.getElementById('startSection').classList.add('hidden');
            userSection.classList.remove('hidden');
            document.getElementById('barcodeInput').focus();
        }

        async function processCode(code) {
            if(!code) return;
            initAudio();
            
            if(isConferenceMode) {
                // MODO DEVOLVER
                const pkg = allPackages.find(p => p.id === code);
                if(pkg) {
                    if(pkg.status === 'Devolvido') {
                        showToast("Já foi devolvido!", "bg-yellow-500", "fa-info-circle");
                        playBeep(false);
                    } else {
                        await window.updateStatusFirebase(code, 'Devolvido');
                        showToast("Devolvido: " + code, "bg-green-600", "fa-check");
                        playBeep(true);
                    }
                } else {
                    showToast("ERRO: Pacote não registrado na rota!", "bg-red-600", "fa-times-circle");
                    playBeep(false);
                }
            } else {
                // MODO ADICIONAR
                const pkg = allPackages.find(p => p.id === code);
                if(pkg) {
                    if(pkg.status === 'Em rota') {
                        showToast("Já está em rota!", "bg-yellow-500", "fa-info-circle");
                        playBeep(false);
                    } else {
                        // RE-ADIÇÃO (Se era Devolvido ou Falta, volta pra rota)
                        await window.updateStatusFirebase(code, 'Em rota');
                        showToast("Re-adicionado à rota", "bg-blue-600", "fa-redo");
                        playBeep(true);
                    }
                } else {
                    // Novo Pacote
                    await window.saveToFirebase(code, currentBatchUser, 'Em rota');
                    showToast("Adicionado: " + code, "bg-blue-600", "fa-plus");
                    playBeep(true);
                }
            }
        }

        async function finalizeOperation() {
            if(confirm("Deseja finalizar o lote? Itens não devolvidos serão marcados como 'Falta'.")) {
                const ok = await window.finalizeInFirebase(currentBatchUser);
                if(ok) {
                    currentBatchUser = null;
                    document.getElementById('userSection').classList.add('hidden');
                    document.getElementById('startSection').classList.remove('hidden');
                    stopCamera();
                    showToast("Operação Finalizada!", "bg-slate-800", "fa-flag-checkered");
                }
            }
        }

        function updateScanUI() {
            const list = document.getElementById('packageList');
            if(allPackages.length === 0) {
                list.innerHTML = `<p class="p-12 text-center text-slate-400 italic">Nenhum registro no banco.</p>`;
            } else {
                list.innerHTML = allPackages.map(p => {
                    let statusClass = "bg-blue-100 text-blue-700";
                    let rowClass = "row-route";
                    if(p.status === 'Devolvido') { statusClass = "bg-green-100 text-green-700"; rowClass = "row-done"; }
                    if(p.status === 'Falta') { statusClass = "bg-red-100 text-red-700"; rowClass = "row-missing"; }

                    return `<div class="p-4 flex justify-between items-center transition-all ${rowClass}">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-mono font-bold text-slate-700 dark:text-gray-200">${p.id}</span>
                                <span class="text-[8px] font-bold px-1.5 py-0.5 rounded ${statusClass}">${p.status.toUpperCase()}</span>
                            </div>
                            <p class="text-[9px] text-slate-400 mt-1 uppercase tracking-tighter">Por: ${p.user} • ${p.time}</p>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('statOk').innerText = allPackages.filter(p => p.status === 'Devolvido').length;
            document.getElementById('statPending').innerText = allPackages.filter(p => p.status === 'Em rota').length;
            document.getElementById('statMissing').innerText = allPackages.filter(p => p.status === 'Falta').length;
            document.getElementById('listCount').innerText = allPackages.length + " total";
        }

        // Utils
        function initAudio() { 
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playBeep(success) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = success ? 'square' : 'sawtooth';
            osc.frequency.setValueAtTime(success ? 2000 : 180, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
        function showToast(msg, color, icon) {
            const t = document.getElementById('toast');
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 z-[100] flex items-center gap-2 text-sm font-bold text-white ${color} opacity-100 translate-y-0`;
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').className = `fas ${icon}`;
            setTimeout(() => { t.classList.add('opacity-0'); t.classList.add('translate-y-[-20px]'); }, 2000);
        }
        function handleManualInput() { 
            const inp = document.getElementById('barcodeInput');
            if(inp.value.trim()) processCode(inp.value.trim()); 
            inp.value = ""; 
        }
        document.getElementById('barcodeInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleManualInput(); });

        async function toggleCamera() {
            initAudio();
            if(isCameraActive) { stopCamera(); return; }
            document.getElementById('cameraContainer').classList.remove('hidden');
            if(!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();
            isCameraActive = true;
            codeReader.decodeFromConstraints({ video: { facingMode: "environment" } }, 'readerVideo', (res) => { if(res) processCode(res.getText()); });
        }
        function stopCamera() { if(codeReader) codeReader.reset(); isCameraActive = false; document.getElementById('cameraContainer').classList.add('hidden'); }
        function openWhatsapp() {
            const phone = document.getElementById('phoneInput').value.replace(/\D/g, '');
            if(phone.length < 10) return showToast("Celular inválido", "bg-red-500", "fa-exclamation");
            window.open(`https://api.whatsapp.com/send?phone=55${phone}`, '_blank');
        }
    </script>
</body>
</html>
