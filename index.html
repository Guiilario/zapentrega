<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiferramentas Entregas - Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot, orderBy, updateDoc, doc, getDocs, where, writeBatch, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC05tYoKOHOBf6pNhhmMqgSap1g3iB4Im4",
            authDomain: "logistica-pacotes.firebaseapp.com",
            projectId: "logistica-pacotes",
            storageBucket: "logistica-pacotes.firebasestorage.app",
            messagingSenderId: "1075697583297",
            appId: "logistica-pacotes"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "logistica-pacotes";

        let listeners = [];
        let currentUser = null;

        const allowedDomains = ['gmail.com', 'hotmail.com', 'outlook.com', 'live.com', 'yahoo.com', 'yahoo.com.br', 'icloud.com', 'bol.com.br', 'uol.com.br', 'terra.com.br', 'ig.com.br', 'msn.com', 'outlook.com.br'];

        window.showApp = () => {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('main-navbar').classList.remove('hidden');
            switchView('zap');
        };

        window.showLogin = () => {
            document.getElementById('view-auth').classList.remove('hidden');
            document.getElementById('main-navbar').classList.add('hidden');
            document.getElementById('view-zap').classList.add('hidden');
            document.getElementById('view-scan').classList.add('hidden');
        };

        function isValidEmail(email) {
            const emailLower = email.toLowerCase();
            if (emailLower === 'admin@gmail.com') return true;
            const domain = emailLower.split('@')[1];
            return allowedDomains.includes(domain);
        }

        async function registerUserInDirectory(user) {
            try {
                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'userRegistry', user.uid);
                await setDoc(userRef, { uid: user.uid, name: user.displayName || "Usuário", email: user.email, lastLogin: serverTimestamp(), status: 'ativo' }, { merge: true });
            } catch (e) { console.error(e); }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'userRegistry', user.uid));
                if (userDoc.exists() && userDoc.data().status === 'bloqueado') {
                    showToast("Conta bloqueada pelo administrador.", "bg-red-600", "fa-user-lock");
                    setTimeout(() => signOut(auth), 2000);
                    return;
                }
                currentUser = user;
                window.showApp();
                initDataListeners(user.uid);
                processLostItems(user.uid);
                registerUserInDirectory(user);
                document.querySelectorAll('.user-display-name').forEach(el => el.innerText = user.displayName || "Usuário");
            } else {
                currentUser = null;
                window.showLogin();
                listeners.forEach(unsub => unsub());
                listeners = [];
            }
        });

        window.handleAuth = async (mode) => {
            let email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const name = document.getElementById('authName').value.trim();
            if (email.toLowerCase() === "ilario") email = "admin@gmail.com";
            if (!email || !password) return showToast("Preencha os campos", "bg-red-500", "fa-exclamation-circle");
            if (!isValidEmail(email)) return showToast("E-mail não permitido", "bg-red-500", "fa-envelope");
            try {
                if (mode === 'login') {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    if (!name) return showToast("Digite seu nome", "bg-red-500", "fa-user");
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: name });
                    await registerUserInDirectory(cred.user);
                }
            } catch (error) { showToast("Erro na autenticação", "bg-red-500", "fa-times"); }
        };

        window.logout = () => signOut(auth);

        function initDataListeners(userId) {
            const collections = ['bipados', 'devolvidos', 'faltas', 'perdidos'];
            let temp = { bipados: [], devolvidos: [], faltas: [], perdidos: [] };
            collections.forEach(col => {
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'users', userId, col), (snap) => {
                    temp[col] = [];
                    snap.forEach(d => {
                        const data = d.data();
                        const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString('pt-BR') : "...";
                        temp[col].push({ ...data, time: time, collection: col });
                    });
                    allPackages = [...temp.bipados, ...temp.devolvidos, ...temp.faltas, ...temp.perdidos];
                    allPackages.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    updateScanUI();
                });
                listeners.push(unsub);
            });
        }

        async function processLostItems(userId) {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const snap = await getDocs(collection(db, 'artifacts', appId, 'users', userId, 'faltas'));
            const batch = writeBatch(db);
            let count = 0;
            snap.forEach(d => {
                const data = d.data();
                if (data.timestamp && data.timestamp.toDate() < today) {
                    batch.set(doc(collection(db, 'artifacts', appId, 'users', userId, 'perdidos')), { ...data, status: 'Perdido', timestamp: serverTimestamp() });
                    batch.delete(doc(db, 'artifacts', appId, 'users', userId, 'faltas', d.id));
                    count++;
                }
            });
            if (count > 0) await batch.commit();
        }

        window.saveToFirebase = async (code) => {
            await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'bipados'), { id: code, user: currentUser.displayName, status: 'Em rota', timestamp: serverTimestamp() });
        };

        window.moveToDevolvedFirebase = async (code) => {
            const snap = await getDocs(query(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'bipados'), where("id", "==", code)));
            const batch = writeBatch(db);
            snap.forEach(d => {
                batch.set(doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'devolvidos')), { ...d.data(), status: 'Devolvido', timestamp: serverTimestamp() });
                batch.delete(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'bipados', d.id));
            });
            await batch.commit();
        };

        window.finalizeInFirebase = async () => {
            const snap = await getDocs(query(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'bipados'), where("status", "==", "Em rota")));
            const batch = writeBatch(db);
            snap.forEach(d => {
                batch.set(doc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'faltas')), { ...d.data(), status: 'Falta', timestamp: serverTimestamp() });
                batch.delete(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'bipados', d.id));
            });
            await batch.commit();
            return true;
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-pulse:active { transform: scale(0.95); }
        .row-done { background-color: rgba(34, 197, 94, 0.1) !important; border-left: 4px solid #22c55e !important; }
        .row-missing { background-color: rgba(239, 68, 68, 0.1) !important; border-left: 4px solid #ef4444 !important; }
        .row-route { background-color: rgba(59, 130, 246, 0.05) !important; border-left: 4px solid #3b82f6 !important; }
        .row-lost { background-color: rgba(15, 15, 15, 0.4) !important; border-left: 4px solid #000 !important; opacity: 0.7; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; width: 100%; max-width: 350px; }
        .toast-item { pointer-events: auto; padding: 12px 24px; border-radius: 9999px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); color: white; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: all 0.4s; opacity: 0; transform: translateY(-20px); }
        .toast-item.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">
    <div id="toast-container"></div>

    <div id="main-navbar" class="fixed top-0 left-0 right-0 h-16 z-40 pointer-events-none hidden">

        <button onclick="toggleTheme()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white dark:bg-zinc-800 shadow-lg flex items-center justify-center text-gray-600 dark:text-gray-200 pointer-events-auto ring-1 ring-gray-200 dark:ring-gray-600 active:scale-90 transition-transform"><i id="themeIcon" class="fas fa-sun"></i></button>

    <div id="menuOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300" onclick="toggleMenu()"></div>

        <div class="p-6 border-b border-gray-100 dark:border-zinc-800 bg-gray-50 dark:bg-zinc-800/50"><span class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Entregador</span><h2 class="user-display-name font-bold text-lg text-gray-800 dark:text-white truncate">Usuário</h2></div>
        <nav class="p-4 flex flex-col gap-2">
            <a href="#" onclick="switchView('zap'); toggleMenu();" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors font-medium text-sm text-gray-700 dark:text-gray-200"><div class="w-8 h-8 rounded-lg bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600"><i class="fab fa-whatsapp"></i></div> Zap Entregas</a>
            <a href="#" onclick="switchView('scan'); toggleMenu();" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors font-medium text-sm text-gray-700 dark:text-gray-200"><div class="w-8 h-8 rounded-lg bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600"><i class="fas fa-barcode"></i></div> Gestão de Lotes</a>
            <div class="mt-auto pt-4 border-t dark:border-zinc-800"><button onclick="logout()" class="flex items-center gap-3 p-3 w-full rounded-xl text-red-600 font-bold transition-colors text-sm"><i class="fas fa-sign-out-alt"></i> Sair da Conta</button></div>
        </nav>
    </div>

    <main id="view-auth" class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-2xl border dark:border-zinc-800 text-center">
            <div class="w-20 h-20 rounded-3xl bg-blue-600 flex items-center justify-center mx-auto mb-4 shadow-xl"><i class="fas fa-truck-fast text-4xl text-white"></i></div>
            <h1 class="text-2xl font-bold mb-1 leading-tight">Multiferramentas</h1>
            <p class="text-sm text-gray-500 mb-8 font-medium">Gestão de Entregas</p>
            <div class="space-y-4 text-left">
                <div id="nameField" class="hidden"><label class="block text-[10px] font-bold text-gray-400 uppercase ml-1">Nome Completo</label><input type="text" id="authName" class="w-full bg-gray-50 dark:bg-zinc-800 p-4 rounded-xl border dark:border-zinc-700 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Seu nome"></div>
                <div><label class="block text-[10px] font-bold text-gray-400 uppercase ml-1">E-mail</label><input type="email" id="authEmail" class="w-full bg-gray-50 dark:bg-zinc-800 p-4 rounded-xl border dark:border-zinc-700 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="exemplo@gmail.com"></div>
                <div><label class="block text-[10px] font-bold text-gray-400 uppercase ml-1">Senha</label><input type="password" id="authPassword" class="w-full bg-gray-50 dark:bg-zinc-800 p-4 rounded-xl border dark:border-zinc-700 outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="••••••••"></div>
                <button id="loginBtn" onclick="handleAuth('login')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold transition-all btn-pulse mt-2 shadow-lg shadow-blue-500/20">Entrar</button>
                <button id="registerBtn" onclick="handleAuth('register')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold transition-all btn-pulse hidden shadow-lg shadow-blue-500/20">Criar Conta</button>
                <p id="toggleText" class="text-center text-sm text-gray-500">Não tem conta? <a href="#" onclick="toggleAuthMode(true)" class="text-blue-500 font-bold">Crie uma agora</a></p>
            </div>
        </div>
    </main>

        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 mb-4 shadow-lg ring-1 ring-green-500/30">
                <i class="fab fa-whatsapp text-5xl text-green-600 dark:text-green-400"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Zap Entregas</h1>
        </div>
        <div class="bg-white dark:bg-zinc-900 p-5 rounded-3xl border border-gray-200 dark:border-zinc-700 shadow-xl">
            <div class="flex gap-3 mb-4">
                <div class="w-20 shrink-0">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Parada</label>
                    <input type="number" id="stopInput" class="w-full bg-gray-100 dark:bg-zinc-800 text-center py-4 rounded-xl font-bold text-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="00">
                </div>
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Telefone</label>
                    <input type="tel" id="phoneInput" class="w-full bg-gray-100 dark:bg-zinc-800 py-4 rounded-xl font-mono text-center text-lg outline-none focus:ring-2 focus:ring-green-500" placeholder="(11) 99999-9999">
                </div>
            </div>
            <div class="flex justify-between items-center px-1 mb-4">
                <button onclick="pasteFromClipboard()" class="text-xs text-gray-500 hover:text-green-600 flex items-center gap-2 font-medium py-1 px-2 rounded hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors"><i class="far fa-clipboard"></i> Colar</button>

            <button onclick="openWhatsapp()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-600/20 btn-pulse mb-3">Chamar no WhatsApp</button>
            <button onclick="openHistoryModal()" class="w-full bg-gray-100 dark:bg-zinc-800 py-3 rounded-2xl text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest"><i class="fas fa-history mr-2"></i> Histórico</button>
        </div>
    </main>

    <main id="view-scan" class="w-full max-w-2xl mx-auto p-4 pt-24 hidden pb-20">
        <header class="flex justify-between items-center mb-6 bg-white dark:bg-zinc-900 p-6 rounded-2xl shadow-sm border dark:border-zinc-700">
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">Minha <span class="text-blue-600">Carga</span></h1>
            <button onclick="location.reload()" class="text-slate-400 hover:text-blue-500 active:rotate-180 transition-all"><i class="fas fa-sync-alt text-xl"></i></button>
        </header>

        <div id="userSection" class="bg-blue-600 rounded-2xl p-6 shadow-lg text-white mb-6 hidden">
            <div class="flex justify-between items-center mb-4"><span class="font-bold text-xs uppercase tracking-widest opacity-80">Bipagem Ativa</span><button onclick="finalizeOperation()" class="bg-white/20 px-3 py-1.5 rounded-xl border border-white/30 text-[10px] font-black uppercase">Finalizar</button></div>
            <input type="text" id="barcodeInput" placeholder="Bipar código de barras..." class="w-full p-4 bg-black/20 rounded-2xl text-white outline-none font-mono mb-4 text-center text-lg">

        </div>

        <div id="startSection" class="bg-white dark:bg-zinc-900 rounded-3xl p-8 border dark:border-zinc-700 text-center shadow-2xl">

            <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10"><div class="w-4/5 h-0.5 bg-green-500 shadow-[0_0_15px_rgba(34,197,94,1)] animate-pulse"></div></div>
            <button onclick="stopCamera()" class="absolute top-4 right-4 bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg z-20"><i class="fas fa-times"></i></button>
        </div>

        <div class="grid grid-cols-4 gap-2 my-8 text-center px-1">

            <div class="bg-white dark:bg-zinc-900 p-3 rounded-2xl border dark:border-zinc-800 shadow-sm"><span class="text-[7px] font-black text-red-500 uppercase tracking-tighter">Falta</span><p id="statMissing" class="text-lg font-black">0</p></div>
            <div class="bg-white dark:bg-zinc-900 p-3 rounded-2xl border dark:border-zinc-800 shadow-sm"><span class="text-[7px] font-black text-gray-500 uppercase tracking-tighter">Perdido</span><p id="statLost" class="text-lg font-black">0</p></div>

        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="closeHistoryModal()"></div>

            <div class="flex justify-between items-center mb-4 border-b dark:border-zinc-700 pb-4">
                <h3 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-calendar-day text-green-500"></i> Hoje</h3>
                <button onclick="closeHistoryModal()" class="text-gray-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="modalHistoryList" class="flex-1 overflow-y-auto space-y-2 no-scrollbar"></div>
            <div class="mt-4 pt-3 border-t dark:border-zinc-700 flex justify-between items-center">
                 <button onclick="clearDailyHistory()" class="text-xs text-red-500 font-bold py-2 px-3 rounded-lg hover:bg-red-50"><i class="fas fa-trash-alt"></i></button>
                <button onclick="saveHistoryPDF()" class="text-xs text-blue-600 font-bold px-3 py-2 rounded-lg bg-blue-50"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
        </div>
    </div>

    <script>
        let allPackages = [];
        let isConferenceMode = false;
        let codeReader = null;
        let isCameraActive = false;
        let audioCtx = null;
        let lastScannedCode = '';
        let lastScannedTime = 0;

        function toggleTheme() { const isDark = document.documentElement.classList.toggle('dark'); document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon'; }
        function toggleMenu() { const side = document.getElementById('sideMenu'); const over = document.getElementById('menuOverlay'); const isOpen = !side.classList.contains('-translate-x-full'); if(!isOpen) { over.classList.remove('hidden'); setTimeout(() => { over.classList.remove('opacity-0'); side.classList.remove('-translate-x-full'); }, 10); } else { over.classList.add('opacity-0'); side.classList.add('-translate-x-full'); setTimeout(() => over.classList.add('hidden'), 300); } }
        function switchView(v) { document.getElementById('view-zap').classList.add('hidden'); document.getElementById('view-scan').classList.add('hidden'); document.getElementById('view-' + v).classList.remove('hidden'); stopCamera(); }
        function startNewBatch(mode) { initAudio(); isConferenceMode = (mode === 'return'); document.getElementById('userSection').classList.remove('hidden'); document.getElementById('startSection').classList.add('hidden'); document.getElementById('barcodeInput').focus(); }
        async function processCode(code) { if(!code) return; initAudio(); const now = Date.now(); if (code === lastScannedCode && (now - lastScannedTime) < 4000) return; lastScannedCode = code; lastScannedTime = now; if(isConferenceMode) { const pkg = allPackages.find(p => p.id === code && p.collection === 'bipados'); if(pkg) { await window.moveToDevolvedFirebase(code); showToast("Item Devolvido!", "bg-green-600", "fa-check"); playBeep(true); } else { showToast("Não registrado ou já OK", "bg-red-600", "fa-times"); playBeep(false); } } else { const existing = allPackages.find(p => p.id === code && p.collection === 'bipados'); if(existing) { showToast("Já está em rota!", "bg-yellow-500", "fa-info"); playBeep(false); } else { await window.saveToFirebase(code); showToast("Adicionado!", "bg-blue-600", "fa-plus"); playBeep(true); } } }
        async function finalizeOperation() { if(confirm("Deseja finalizar o procedimento?")) { if (isConferenceMode) await window.finalizeInFirebase(); document.getElementById('userSection').classList.add('hidden'); document.getElementById('startSection').classList.remove('hidden'); stopCamera(); showToast("Concluído!", "bg-slate-800", "fa-flag-checkered"); } }
        function updateScanUI() { const list = document.getElementById('packageList'); if(allPackages.length === 0) list.innerHTML = `<p class="p-12 text-center text-slate-400 italic text-sm">Nenhum registro encontrado.</p>`; else list.innerHTML = allPackages.map(p => { let sCol = "bg-blue-100 text-blue-700"; let rCol = "row-route"; if(p.collection === 'devolvidos') { sCol = "bg-green-100 text-green-700"; rCol = "row-done"; } if(p.collection === 'faltas') { sCol = "bg-red-100 text-red-700"; rCol = "row-missing"; } if(p.collection === 'perdidos') { sCol = "bg-zinc-800 text-white"; rCol = "row-lost"; } return `<div class="p-4 flex justify-between items-center ${rCol} border-b dark:border-zinc-800/50 transition-all"><div><div class="flex items-center gap-2"><span class="font-mono font-bold text-sm text-gray-700 dark:text-gray-200">${p.id}</span><span class="text-[8px] font-bold px-1.5 py-0.5 rounded ${sCol}">${p.status.toUpperCase()}</span></div><p class="text-[9px] text-slate-400 mt-0.5 uppercase tracking-tighter">${p.time}</p></div></div>`; }).join(''); document.getElementById('statPending').innerText = allPackages.filter(p => p.collection === 'bipados').length; document.getElementById('statOk').innerText = allPackages.filter(p => p.collection === 'devolvidos').length; document.getElementById('statMissing').innerText = allPackages.filter(p => p.collection === 'faltas').length; document.getElementById('statLost').innerText = allPackages.filter(p => p.collection === 'perdidos').length; }
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx.state === 'suspended') audioCtx.resume(); }
        function playBeep(s) { if(!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type = s ? 'square' : 'sawtooth'; o.frequency.setValueAtTime(s ? 2000 : 180, audioCtx.currentTime); g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }
        function showToast(m, c, i) { const container = document.getElementById('toast-container'); const toast = document.createElement('div'); toast.className = `toast-item ${c}`; toast.innerHTML = `<i class="fas ${i}"></i> <span>${m}</span>`; container.appendChild(toast); setTimeout(() => toast.classList.add('show'), 10); setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000); }
        function handleManualInput() { const i = document.getElementById('barcodeInput'); if(i.value.trim()) processCode(i.value.trim()); i.value = ""; }
        document.getElementById('barcodeInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleManualInput(); });
        async function toggleCamera() { initAudio(); if(isCameraActive) { stopCamera(); return; } document.getElementById('cameraContainer').classList.remove('hidden'); document.getElementById('camBtnText').innerText = "Parar"; if(!codeReader) codeReader = new ZXing.BrowserMultiFormatReader(); isCameraActive = true; try { await codeReader.decodeFromConstraints({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } }, 'readerVideo', (res) => { if(res) processCode(res.getText()); }); setTimeout(() => { const v = document.getElementById('readerVideo'); if (v && v.srcObject) { const t = v.srcObject.getVideoTracks()[0]; const c = t.getCapabilities(); if (c && c.zoom) t.applyConstraints({ advanced: [{ zoom: Math.min(2.0, c.zoom.max) }] }); } }, 1000); } catch (err) { stopCamera(); showToast("Erro câmera", "bg-red-500", "fa-video-slash"); } }
        function stopCamera() { if(codeReader) codeReader.reset(); isCameraActive = false; document.getElementById('cameraContainer').classList.add('hidden'); document.getElementById('camBtnText').innerText = "Scanner Câmera"; }
        window.toggleAuthMode = (r) => { document.getElementById('nameField').classList.toggle('hidden', !r); document.getElementById('loginBtn').classList.toggle('hidden', r); document.getElementById('registerBtn').classList.toggle('hidden', !r); document.getElementById('toggleText').innerHTML = r ? 'Já tem conta? <a href="#" onclick="toggleAuthMode(false)" class="text-blue-500 font-bold">Faça login</a>' : 'Não tem conta? <a href="#" onclick="toggleAuthMode(true)" class="text-blue-500 font-bold">Crie agora</a>'; };
        const phoneInput = document.getElementById('phoneInput'); phoneInput.addEventListener('input', function (e) { let v = e.target.value.replace(/\D/g, ''); if (v.length > 11) v = v.slice(0, 11); if (v.length > 10) v = v.replace(/^(\d\d)(\d{5})(\d{4}).*/, "($1) $2-$3"); else if (v.length > 6) v = v.replace(/^(\d\d)(\d{4})(\d{0,4}).*/, "($1) $2-$3"); else if (v.length > 2) v = v.replace(/^(\d\d)(\d{0,5}).*/, "($1) $2"); else if (v.length > 0) v = v.replace(/^(\d*)/, "($1"); e.target.value = v; });
        function openWhatsapp(override = null) { let n = override || phoneInput.value.replace(/\D/g, ''); if (n.length < 10) return showToast("Número inválido", "bg-red-500", "fa-exclamation"); let m = encodeURIComponent(document.getElementById('messageInput').value); window.open(`https://api.whatsapp.com/send?phone=55${n}&text=${m}`, '_blank'); }
        async function pasteFromClipboard() { try { const text = await navigator.clipboard.readText(); const clean = text.replace(/\D/g, ''); if (clean.length >= 10) { phoneInput.value = clean.startsWith('55') ? clean.substring(2) : clean; phoneInput.dispatchEvent(new Event('input')); } } catch (err) { } }
        function clearInputs() { phoneInput.value = ""; document.getElementById('stopInput').value = ""; }
        function openHistoryModal() { document.getElementById('historyModal').classList.remove('hidden'); renderHistoryList(); }
        function closeHistoryModal() { document.getElementById('historyModal').classList.add('hidden'); }
        function renderHistoryList() { const list = document.getElementById('modalHistoryList'); const h = JSON.parse(localStorage.getItem('wa_history_v2') || '[]'); const t = new Date().toLocaleDateString('pt-BR'); const todays = h.filter(i => i.date === t); if (todays.length === 0) { list.innerHTML = `<p class="text-center py-8 text-gray-400 text-sm italic">Nenhum contato hoje.</p>`; return; } list.innerHTML = todays.map(i => `<div class="flex items-center justify-between bg-gray-50 dark:bg-zinc-800 p-3 rounded-2xl border dark:border-zinc-700"><div class="flex items-center gap-2"><span class="bg-gray-200 dark:bg-zinc-700 px-2 py-0.5 rounded text-[10px] font-bold">P:${i.stop || '-'}</span><span class="text-xs font-mono text-gray-800 dark:text-gray-200">${i.phone}</span></div><button onclick="openWhatsapp('${i.phone}')" class="text-green-500 text-xl"><i class="fab fa-whatsapp"></i></button></div>`).join(''); }
        function clearDailyHistory() { const t = new Date().toLocaleDateString('pt-BR'); let h = JSON.parse(localStorage.getItem('wa_history_v2') || '[]'); localStorage.setItem('wa_history_v2', JSON.stringify(h.filter(i => i.date !== t))); renderHistoryList(); }
        function saveHistoryPDF() { const h = JSON.parse(localStorage.getItem('wa_history_v2') || '[]'); const t = new Date().toLocaleDateString('pt-BR'); const d = h.filter(i => i.date === t).reverse(); if (d.length === 0) return; const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(`Relatório de Contatos - ${t}`, 14, 20); doc.autoTable({ head: [['Parada', 'Telefone', 'Horário']], body: d.map(i => [i.stop || '-', i.phone, new Date(i.timestamp).toLocaleTimeString()]), startY: 30 }); doc.save(`entregas_${t}.pdf`); }
    </script>
</body>
